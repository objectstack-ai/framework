  <rect x="330" y="599" width="14" height="12" fill="#ffffff" stroke="#c8ccd2" stroke-dasharray="3 2"/>
  <text x="350" y="609" font-size="10.5" fill="#7a828c">dashed = existing Studio component (reused, not rebuilt)</text>
