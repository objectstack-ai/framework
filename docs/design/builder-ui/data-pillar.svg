  <circle cx="953" cy="363" r="7" fill="#ffffff"/>
  <text x="800" y="482" font-size="9.5" fill="#9aa0a8" font-style="italic">Studio protocol-</text>
  <text x="800" y="494" font-size="9.5" fill="#9aa0a8" font-style="italic">generated field form (reused)</text>

  <!-- ===== footer legend ===== -->
