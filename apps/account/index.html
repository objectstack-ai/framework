<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ObjectOS Account</title>
    <!--
      Boot skeleton.

      The Account SPA bundle is ~1.3 MB gzipped and the i18n locale ships
      separately, so on a cold load there's a 200–800 ms window between
      `index.html` paint and React mounting our `AuthShell`. Without
      something here the user sees either:
        - a flash of blank white background, then
        - a flash of `@object-ui/i18n`'s bundled-default zh translation
          ("登录您的账户" with raw `auth.emailLabel` field labels), then
        - the real form.

      The skeleton below is intentionally framework-agnostic (no React, no
      Tailwind) — pure inline CSS + a spinner — so it renders the instant
      this document is parsed. React's first commit will replace
      `#root`'s children, removing the skeleton automatically.
    -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #fff; font-family: Inter, system-ui, sans-serif; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #0a0a0a; }
        .boot-skeleton__label { color: #a3a3a3 !important; }
        .boot-skeleton__spinner { border-color: #404040 !important; border-top-color: transparent !important; }
      }
      .boot-skeleton {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 12px;
      }
      .boot-skeleton__spinner {
        width: 32px; height: 32px;
        border: 2px solid #d4d4d4;
        border-top-color: transparent;
        border-radius: 50%;
        animation: boot-skeleton-spin 0.8s linear infinite;
      }
      .boot-skeleton__label {
        font-size: 13px; color: #737373;
      }
      @keyframes boot-skeleton-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-skeleton" aria-hidden="true">
        <div class="boot-skeleton__spinner"></div>
        <div class="boot-skeleton__label">Loading…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
