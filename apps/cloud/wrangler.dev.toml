# wrangler.dev.toml — local-development override of wrangler.toml.
#
# Differs from wrangler.toml in two ways:
#   1. `image` points at the local Dockerfile so `wrangler dev` builds the
#      container against your working tree (instead of pulling the stale
#      registry tag).
#   2. `image_build_context = "../.."` because the Dockerfile expects the
#      pnpm workspace root as build context.
#
# Run from apps/cloud:
#
#   pnpm exec wrangler dev --config wrangler.dev.toml
#
# Place secrets in apps/cloud/.dev.vars (gitignored). At minimum set:
#   AUTH_SECRET, OS_DATABASE_URL (or accept the default empty for SQLite),
#   AUTH_BASE_URL=http://localhost:8787, OS_TRUSTED_ORIGINS.

name = "objectstack-cloud"
main = "cloudflare/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "CloudContainer"
image = "Dockerfile"
image_build_context = "../.."
max_instances = 1
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "CLOUD"
class_name = "CloudContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CloudContainer"]

[observability]
enabled = true
